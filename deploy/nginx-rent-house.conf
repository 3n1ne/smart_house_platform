server {
    listen 80;
    server_name rent-house.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rent-house.example.com;

    ssl_certificate /etc/nginx/certs/rent-house/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/rent-house/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /var/www/rent-house/frontend/dist;
    index index.html;

    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        alias /var/www/rent-house/uploads/;
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/webp webp;
            video/mp4 mp4;
        }
        default_type application/octet-stream;
        add_header X-Content-Type-Options nosniff always;
        autoindex off;
    }

    location ~* \.(php|pl|py|cgi|sh|bat|cmd|ps1)$ {
        deny all;
    }
}
